<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AutoSecAudit Visual Report - https://lynolz.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 12% 18%, rgba(14,165,233,0.10), transparent 34%),
        radial-gradient(circle at 88% 12%, rgba(16,185,129,0.10), transparent 38%),
        linear-gradient(180deg, #f8fafc, #eef2ff 46%, #f8fafc);
    }
    .glass {
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(148,163,184,0.22);
      box-shadow: 0 18px 40px rgba(15,23,42,0.06);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="min-h-screen text-slate-900">
  <script id="audit-report-data" type="application/json">{&quot;meta&quot;: {&quot;generated_at&quot;: &quot;2026-02-24T06:56:43.721433+00:00&quot;, &quot;target&quot;: &quot;https://lynolz.com&quot;, &quot;decision_summary&quot;: &quot;Proposed 2 safe action(s), total estimated cost 22, remaining budget after plan 5. Blocked actions: 2. Executable actions after environment checks: 0.&quot;, &quot;resumed&quot;: false, &quot;resumed_from&quot;: &quot;None&quot;}, &quot;summary&quot;: {&quot;audit_score&quot;: 100, &quot;score_label&quot;: &quot;Excellent&quot;, &quot;total_findings&quot;: 0, &quot;vulnerability_findings&quot;: 0, &quot;severity_counts&quot;: {&quot;critical&quot;: 0, &quot;high&quot;: 0, &quot;medium&quot;: 0, &quot;low&quot;: 0, &quot;info&quot;: 0}, &quot;history_count&quot;: 1, &quot;iteration_count&quot;: 2, &quot;budget_remaining&quot;: 27, &quot;budget_start_inferred&quot;: 30}, &quot;history&quot;: [{&quot;index&quot;: 1, &quot;tool&quot;: &quot;passive_config_audit&quot;, &quot;target&quot;: &quot;https://lynolz.com:443&quot;, &quot;status&quot;: &quot;completed&quot;, &quot;started_at&quot;: &quot;2026-02-24T06:56:38.440431+00:00&quot;, &quot;ended_at&quot;: &quot;2026-02-24T06:56:43.662503+00:00&quot;, &quot;action_cost&quot;: 3, &quot;budget_before&quot;: 30, &quot;budget_after&quot;: 27, &quot;error&quot;: null}], &quot;budget_trace&quot;: [{&quot;step&quot;: 0, &quot;label&quot;: &quot;Start&quot;, &quot;tool&quot;: &quot;&quot;, &quot;cost&quot;: 0, &quot;budget_before&quot;: 30, &quot;budget_after&quot;: 30, &quot;cumulative_spent&quot;: 0}, {&quot;step&quot;: 1, &quot;label&quot;: &quot;1. passive_config_audit&quot;, &quot;tool&quot;: &quot;passive_config_audit&quot;, &quot;cost&quot;: 3, &quot;budget_before&quot;: 30, &quot;budget_after&quot;: 27, &quot;cumulative_spent&quot;: 3}], &quot;scope&quot;: {&quot;scope&quot;: [&quot;lynolz.com&quot;], &quot;breadcrumbs&quot;: [{&quot;type&quot;: &quot;service&quot;, &quot;data&quot;: &quot;https://lynolz.com&quot;}, {&quot;type&quot;: &quot;endpoint&quot;, &quot;data&quot;: &quot;https://lynolz.com/&quot;}], &quot;surface&quot;: {&quot;config_exposures&quot;: []}}, &quot;findings&quot;: []}</script>
  <script id="agent-state-data" type="application/json">{&quot;scope&quot;: [&quot;lynolz.com&quot;], &quot;breadcrumbs&quot;: [{&quot;type&quot;: &quot;service&quot;, &quot;data&quot;: &quot;https://lynolz.com&quot;}, {&quot;type&quot;: &quot;endpoint&quot;, &quot;data&quot;: &quot;https://lynolz.com/&quot;}], &quot;history&quot;: [{&quot;tool&quot;: &quot;passive_config_audit&quot;, &quot;target&quot;: &quot;https://lynolz.com:443&quot;, &quot;options&quot;: {}, &quot;idempotency_key&quot;: &quot;efbb8a4100c2295cd5ed66a9e2aa26f89be041957aa749a256d9f3a0138bbdeb&quot;, &quot;status&quot;: &quot;completed&quot;, &quot;started_at&quot;: &quot;2026-02-24T06:56:38.440431+00:00&quot;, &quot;ended_at&quot;: &quot;2026-02-24T06:56:43.662503+00:00&quot;, &quot;artifacts&quot;: [&quot;C:\\Users\\Administrator\\Desktop\\agent\\output_lynolz_agent_v2\\agent\\artifacts\\A1_passive_config_audit.json&quot;], &quot;action_cost&quot;: 3, &quot;budget_before&quot;: 30, &quot;budget_after&quot;: 27}], &quot;surface&quot;: {&quot;config_exposures&quot;: []}, &quot;budget_remaining&quot;: 27, &quot;target&quot;: &quot;https://lynolz.com&quot;, &quot;iteration_count&quot;: 2, &quot;resumed&quot;: false, &quot;resumed_from&quot;: null}</script>
  <div id="root"></div>
  <script type="text/babel">
    const auditReport = JSON.parse(document.getElementById("audit-report-data").textContent || "{}");
    const agentState = JSON.parse(document.getElementById("agent-state-data").textContent || "{}");

    const severityRank = ["critical", "high", "medium", "low", "info"];
    const severityBadge = {
      critical: "bg-rose-600 text-white",
      high: "bg-orange-500 text-white",
      medium: "bg-amber-300 text-slate-900",
      low: "bg-emerald-300 text-slate-900",
      info: "bg-sky-200 text-slate-900"
    };

    function MetricCard({ label, value, sub }) {
      return (
        <div className="glass rounded-2xl p-4">
          <div className="text-xs uppercase tracking-[0.14em] text-slate-500">{label}</div>
          <div className="mt-2 text-2xl font-semibold tabular-nums">{value}</div>
          {sub ? <div className="mt-1 text-sm text-slate-500">{sub}</div> : null}
        </div>
      );
    }

    function BudgetLineChart({ trace }) {
      const points = Array.isArray(trace) ? trace.filter((p) => typeof p.cumulative_spent === "number") : [];
      if (!points.length) {
        return <div className="text-sm text-slate-500">No budget trace available.</div>;
      }
      const width = 760;
      const height = 220;
      const pad = 26;
      const maxY = Math.max(1, ...points.map((p) => p.cumulative_spent || 0));
      const maxX = Math.max(1, points.length - 1);
      const coords = points.map((p, i) => {
        const x = pad + ((width - pad * 2) * (points.length === 1 ? 0 : i / maxX));
        const y = height - pad - ((height - pad * 2) * ((p.cumulative_spent || 0) / maxY));
        return { ...p, x, y };
      });
      const linePath = coords.map((p, idx) => (idx === 0 ? "M" : "L") + p.x + "," + p.y).join(" ");
      const areaPath = linePath + " L" + coords[coords.length - 1].x + "," + (height - pad) + " L" + coords[0].x + "," + (height - pad) + " Z";
      return (
        <div>
          <div className="w-full overflow-x-auto">
            <svg viewBox={"0 0 " + width + " " + height} className="w-full min-w-[520px]">
              <defs>
                <linearGradient id="budgetFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#0ea5e9" stopOpacity="0.26" />
                  <stop offset="100%" stopColor="#0ea5e9" stopOpacity="0.03" />
                </linearGradient>
              </defs>
              <rect x="0" y="0" width={width} height={height} rx="16" fill="#ffffff" opacity="0.75" />
              {[0, 0.25, 0.5, 0.75, 1].map((r, idx) => {
                const y = pad + (height - pad * 2) * r;
                return <line key={idx} x1={pad} y1={y} x2={width - pad} y2={y} stroke="#e2e8f0" strokeWidth="1" />;
              })}
              {coords.length > 1 ? <path d={areaPath} fill="url(#budgetFill)" /> : null}
              <path d={linePath} fill="none" stroke="#0284c7" strokeWidth="3" strokeLinecap="round" />
              {coords.map((p) => (
                <g key={p.step}>
                  <circle cx={p.x} cy={p.y} r="4" fill="#0284c7" />
                  <text x={p.x} y={height - 7} textAnchor="middle" fontSize="10" fill="#475569">{p.step}</text>
                </g>
              ))}
            </svg>
          </div>
          <div className="mt-3 space-y-1 text-xs text-slate-600">
            {points.slice(-10).map((p) => (
              <div key={"legend-" + p.step} className="flex justify-between gap-3">
                <span className="truncate">{p.label}</span>
                <span className="tabular-nums">+{p.cost || 0} (total {p.cumulative_spent || 0})</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ScopeMap({ scopePayload }) {
      const scopeList = Array.isArray(scopePayload?.scope) ? scopePayload.scope : [];
      const breadcrumbs = Array.isArray(scopePayload?.breadcrumbs) ? scopePayload.breadcrumbs : [];
      const surface = scopePayload?.surface && typeof scopePayload.surface === "object" ? scopePayload.surface : {};
      const discoveredUrls = Array.isArray(surface.discovered_urls) ? surface.discovered_urls : [];
      const apiEndpoints = Array.isArray(surface.api_endpoints) ? surface.api_endpoints : [];
      return (
        <div className="glass rounded-2xl p-5">
          <div className="flex items-center justify-between">
            <h2 className="text-lg font-semibold">Scope Asset Map</h2>
            <div className="text-xs text-slate-500">Scope / breadcrumbs / surface</div>
          </div>
          <div className="mt-4 grid gap-4 lg:grid-cols-3">
            <div>
              <div className="text-xs uppercase tracking-wider text-slate-500">Scope</div>
              <div className="mt-2 flex flex-wrap gap-2">
                {scopeList.length ? scopeList.map((item, idx) => (
                  <span key={idx} className="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium">{item}</span>
                )) : <span className="text-sm text-slate-500">No scope entries</span>}
              </div>
            </div>
            <div>
              <div className="text-xs uppercase tracking-wider text-slate-500">Breadcrumbs</div>
              <div className="mt-2 max-h-48 space-y-1 overflow-auto rounded-xl bg-slate-50 p-2 text-xs">
                {breadcrumbs.length ? breadcrumbs.map((b, idx) => (
                  <div key={idx} className="flex gap-2">
                    <span className="w-16 shrink-0 text-slate-500">{b.type}</span>
                    <span className="break-all text-slate-700">{b.data}</span>
                  </div>
                )) : <div className="text-slate-500">No breadcrumbs</div>}
              </div>
            </div>
            <div>
              <div className="text-xs uppercase tracking-wider text-slate-500">Surface</div>
              <div className="mt-2 text-xs text-slate-700 space-y-1">
                <div>Discovered URLs: <span className="font-semibold">{discoveredUrls.length}</span></div>
                <div>API Endpoints: <span className="font-semibold">{apiEndpoints.length}</span></div>
                <div className="mt-2 max-h-40 overflow-auto rounded-xl bg-slate-50 p-2">
                  {discoveredUrls.slice(0, 12).map((u, idx) => <div key={idx} className="truncate">{u}</div>)}
                  {discoveredUrls.length > 12 ? <div className="text-slate-500">... {discoveredUrls.length - 12} more</div> : null}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function VulnerabilityCard({ item }) {
      const severity = String(item?.severity || "medium").toLowerCase();
      const steps = Array.isArray(item?.reproduction_steps) ? item.reproduction_steps : [];
      return (
        <div className="glass rounded-2xl p-5">
          <div className="flex items-start justify-between gap-3">
            <div>
              <div className="text-sm text-slate-500">Finding #{item.index}</div>
              <h3 className="mt-1 text-lg font-semibold">{item.name}</h3>
            </div>
            <span className={"rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-wider " + (severityBadge[severity] || severityBadge.medium)}>
              {severity}
            </span>
          </div>
          <div className="mt-4 grid gap-4 xl:grid-cols-2">
            <div>
              <div className="text-xs uppercase tracking-wider text-slate-500">Evidence</div>
              <pre className="mt-2 max-h-56 overflow-auto rounded-xl bg-slate-900 p-3 text-xs leading-relaxed text-slate-100 whitespace-pre-wrap">
{String(item.evidence || "No evidence provided.")}
              </pre>
            </div>
            <div className="space-y-4">
              <div>
                <div className="text-xs uppercase tracking-wider text-slate-500">Reproduction Steps</div>
                <ol className="mt-2 list-decimal space-y-1 pl-5 text-sm text-slate-700">
                  {steps.length ? steps.map((s, idx) => <li key={idx}>{s}</li>) : <li>No steps provided.</li>}
                </ol>
              </div>
              <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-3">
                <div className="text-xs font-semibold uppercase tracking-wider text-emerald-700">Fix Guidance</div>
                <p className="mt-1 text-sm text-emerald-900 leading-relaxed">
                  {item.recommendation || "No remediation recommendation provided."}
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const summary = auditReport.summary || {};
      const meta = auditReport.meta || {};
      const scopePayload = auditReport.scope || {};
      const findings = Array.isArray(auditReport.findings) ? auditReport.findings : [];
      const vulnFindings = findings
        .filter((f) => String(f.type || "").toLowerCase() === "vuln")
        .sort((a, b) => severityRank.indexOf(String(a.severity || "info")) - severityRank.indexOf(String(b.severity || "info")));
      const severityCounts = summary.severity_counts || {};
      const highCritical = Number(severityCounts.critical || 0) + Number(severityCounts.high || 0);

      return (
        <div className="mx-auto max-w-7xl px-4 py-8 md:px-6">
          <div className="glass rounded-3xl p-6">
            <div className="flex flex-wrap items-start justify-between gap-5">
              <div>
                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">AutoSecAudit Agent</div>
                <h1 className="mt-2 text-2xl font-semibold md:text-3xl">Visual Audit Report</h1>
                <div className="mt-2 break-all text-sm text-slate-700">{meta.target || agentState.target || "Unknown target"}</div>
                <div className="mt-1 text-sm text-slate-500">{meta.decision_summary || "No decision summary available."}</div>
              </div>
              <div className="rounded-2xl bg-slate-900 px-5 py-4 text-white">
                <div className="text-xs uppercase tracking-wider text-slate-300">Audit Score</div>
                <div className="mt-1 text-3xl font-semibold tabular-nums">{summary.audit_score ?? 0}</div>
                <div className="text-xs text-slate-300">{summary.score_label || "N/A"}</div>
              </div>
            </div>
          </div>

          <div className="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
            <MetricCard label="Findings" value={summary.total_findings ?? 0} sub={"Vulns: " + (summary.vulnerability_findings ?? 0)} />
            <MetricCard label="High/Critical" value={highCritical} sub={"Critical " + (severityCounts.critical || 0) + " / High " + (severityCounts.high || 0)} />
            <MetricCard label="Budget Remaining" value={summary.budget_remaining ?? 0} sub={"Iterations " + (summary.iteration_count ?? 0)} />
            <MetricCard label="Executed Actions" value={summary.history_count ?? 0} sub={meta.resumed ? ("Resumed: " + (meta.resumed_from || "state")) : "Fresh run"} />
          </div>

          <div className="mt-6 grid gap-6 xl:grid-cols-[1.15fr_0.85fr]">
            <div className="glass rounded-2xl p-5">
              <div className="flex items-center justify-between">
                <h2 className="text-lg font-semibold">Action Budget Consumption</h2>
                <div className="text-xs text-slate-500">Cumulative cost line chart</div>
              </div>
              <div className="mt-4">
                <BudgetLineChart trace={auditReport.budget_trace || []} />
              </div>
            </div>
            <div className="glass rounded-2xl p-5">
              <h2 className="text-lg font-semibold">Severity Distribution</h2>
              <div className="mt-4 space-y-3">
                {severityRank.map((sev) => {
                  const value = Number(severityCounts[sev] || 0);
                  const all = severityRank.map((k) => Number(severityCounts[k] || 0));
                  const max = Math.max(1, ...all);
                  const pct = value ? Math.max(5, Math.round((value / max) * 100)) : 0;
                  return (
                    <div key={sev}>
                      <div className="mb-1 flex justify-between text-sm">
                        <span className="capitalize">{sev}</span>
                        <span className="tabular-nums text-slate-600">{value}</span>
                      </div>
                      <div className="h-2 rounded-full bg-slate-100">
                        <div className="h-2 rounded-full bg-gradient-to-r from-cyan-400 to-blue-500" style={{ width: pct + "%" }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="mt-6">
            <ScopeMap scopePayload={scopePayload} />
          </div>

          <div className="mt-6">
            <div className="mb-3 flex items-center justify-between">
              <h2 className="text-lg font-semibold">Vulnerability Cards</h2>
              <div className="text-xs text-slate-500">Evidence + remediation suggestions</div>
            </div>
            <div className="space-y-4">
              {vulnFindings.length ? vulnFindings.map((item) => (
                <VulnerabilityCard key={String(item.index) + "-" + String(item.name)} item={item} />
              )) : (
                <div className="glass rounded-2xl p-6 text-sm text-slate-500">No vulnerability findings available.</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
