{
  "skill": {
    "name": "cve_lookup",
    "version": "1.0",
    "tool": "cve_lookup",
    "category": "validation",
    "description": "Query NVD for known CVEs based on detected technology components."
  },
  "triggers": {
    "phase": ["verification"],
    "when": [{"condition": "has_tech_stack"}, {"condition": "not_already_done"}],
    "target_source": "surface.tech_stack",
    "target_type": "tech_component"
  },
  "parameters": {
    "defaults": {
      "component": "$component",
      "version": "$version",
      "service": "$service",
      "rag_intel_hits": "$rag_intel_hits",
      "rag_recommended_tools": "$rag_recommended_tools",
      "max_results": 10,
      "severity": "medium"
    },
    "constraints": {}
  },
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.cve_candidates", "condition": "non_empty", "meaning": "detected CVE candidates with automation support"}
    ],
    "output_extraction": {},
    "severity_mapping": {},
    "severity_escalation": []
  },
  "follow_up": {
    "on_candidates_discovered": {
      "condition": "cve_candidates_present",
      "trigger": ["cve_verify"],
      "reason": "CVE candidates with nuclei coverage should be verified."
    }
  },
  "risk": {"level": "safe", "cost": 5, "priority": 35, "retry": {"max_retries": 1, "backoff_seconds": 1.0}},
  "dependencies": {"runtime": "internet", "tools": ["tech_stack_fingerprint"]}
}
