{
  "skill": {
    "name": "smtp_security_check",
    "version": "1.0",
    "tool": "smtp_security_check",
    "category": "validation",
    "description": "Collect SMTP banner, EHLO capabilities, and STARTTLS exposure safely."
  },
  "triggers": {
    "phase": ["passive_recon", "verification"],
    "when": [
      {"condition": "not_already_done"},
      {"condition": "service_port_matches", "services": ["smtp", "smtps", "submission"], "ports": [25, 465, 587]}
    ],
    "target_source": "surface",
    "target_type": "service_port"
  },
  "parameters": {
    "defaults": {
      "port": "$port",
      "service": "$service",
      "timeout_seconds": 5,
      "read_bytes": 2048,
      "ehlo_domain": "autosecaudit.local"
    },
    "constraints": {}
  },
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.smtp_security_checks", "condition": "non_empty", "meaning": "SMTP service metadata collected"}
    ],
    "output_extraction": {
      "surface_updates": [
        {"field": "smtp_security_checks", "source": "surface_delta.smtp_security_checks"}
      ]
    },
    "severity_mapping": {
      "does not advertise starttls": "low"
    },
    "severity_escalation": []
  },
  "follow_up": {
    "on_mail_stack": {
      "trigger": ["rag_intel_lookup", "cve_lookup"],
      "when_surface_contains": {"tech_component_names": ["smtp", "postfix", "exim", "exchange", "opensmtpd", "sendmail", "haraka", "qmail", "courier"]},
      "reason": "SMTP banner metadata can inform exploit intelligence and CVE lookup."
    }
  },
  "risk": {"level": "safe", "cost": 5, "priority": 19, "retry": {"max_retries": 1, "backoff_seconds": 0.5}},
  "dependencies": {"tools": ["nmap_scan", "service_banner_probe"]}
}
