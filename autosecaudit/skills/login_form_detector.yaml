{
  "skill": {
    "name": "login_form_detector",
    "version": "1.0",
    "tool": "login_form_detector",
    "category": "recon",
    "description": "Detect login and authentication forms from passive page inspection."
  },
  "triggers": {
    "phase": ["passive_recon"],
    "when": [{"condition": "has_http_origin"}, {"condition": "not_already_done"}],
    "target_source": "origins",
    "target_type": "origin_url"
  },
  "parameters": {"defaults": {}, "constraints": {}},
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.login_forms", "condition": "non_empty", "meaning": "login forms discovered"}
    ],
    "output_extraction": {},
    "severity_mapping": {},
    "severity_escalation": []
  },
  "follow_up": {
    "on_login_form_found": {
      "condition": "login_form_found",
      "trigger": ["cookie_security_audit", "passive_config_audit"],
      "reason": "Authentication surface should trigger session and config review."
    }
  },
  "risk": {"level": "safe", "cost": 3, "priority": 4, "retry": {}},
  "dependencies": {"runtime": null, "tools": []}
}
