{
  "skill": {
    "name": "poc_sandbox_exec",
    "version": "1.0",
    "tool": "poc_sandbox_exec",
    "category": "validation",
    "description": "Execute approved PoC code inside sandbox and return execution evidence."
  },
  "triggers": {
    "phase": ["verification"],
    "when": [
      {"condition": "has_tech_stack"},
      {"condition": "rag_tool_recommended", "tools": ["poc_sandbox_exec"]},
      {"condition": "authorization_confirmed"},
      {"condition": "approval_granted"},
      {"condition": "not_already_done"}
    ],
    "target_source": "surface.tech_stack",
    "target_type": "tech_component"
  },
  "parameters": {
    "defaults": {
      "code_template": "$poc_template",
      "cve_id": "$cve_id",
      "cve_ids": "$cve_ids",
      "component": "$component",
      "version": "$version",
      "service": "$service",
      "port": "$port",
      "rag_intel_hits": "$rag_intel_hits",
      "rag_recommended_tools": "$rag_recommended_tools",
      "approval_granted": "$approval_granted",
      "authorization_confirmed": "$authorization_confirmed",
      "timeout_seconds": 25,
      "safe_mode": true,
      "safety_grade": "$safety_grade"
    },
    "constraints": {}
  },
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.poc_sandbox_runs", "condition": "non_empty", "meaning": "sandbox execution produced evidence"}
    ],
    "output_extraction": {},
    "severity_mapping": {
      "VULNERABLE_SIGNAL": "high"
    },
    "severity_escalation": []
  },
  "follow_up": {
    "on_vulnerability_signal": {
      "trigger": ["cve_verify"],
      "reason": "Sandbox signal should be cross-validated by deterministic template checks.",
      "condition": "findings_present"
    }
  },
  "risk": {"level": "high", "cost": 18, "priority": 42, "retry": {"max_retries": 0, "backoff_seconds": 0.0}},
  "dependencies": {"runtime": "python", "tools": ["rag_intel_lookup"]}
}
