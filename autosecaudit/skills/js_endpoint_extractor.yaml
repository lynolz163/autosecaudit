{
  "skill": {
    "name": "js_endpoint_extractor",
    "version": "1.0",
    "tool": "js_endpoint_extractor",
    "category": "recon",
    "description": "Inspect same-origin HTML and JavaScript to discover hidden endpoints."
  },
  "triggers": {
    "phase": ["passive_recon", "active_discovery"],
    "when": [{"condition": "has_http_origin"}, {"condition": "not_already_done"}],
    "target_source": "origins",
    "target_type": "origin_url"
  },
  "parameters": {"defaults": {}, "constraints": {}},
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.api_endpoints", "condition": "non_empty", "meaning": "API endpoints discovered from scripts"}
    ],
    "output_extraction": {},
    "severity_mapping": {},
    "severity_escalation": []
  },
  "follow_up": {
    "on_js_endpoints_found": {
      "condition": "js_endpoints_found",
      "trigger": ["api_schema_discovery", "dynamic_crawl"],
      "reason": "Discovered script endpoints should be crawled and checked for schema exposure."
    }
  },
  "risk": {"level": "safe", "cost": 4, "priority": 8, "retry": {}},
  "dependencies": {"runtime": null, "tools": []}
}
