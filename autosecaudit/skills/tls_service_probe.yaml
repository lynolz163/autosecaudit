{
  "skill": {
    "name": "tls_service_probe",
    "version": "1.0",
    "tool": "tls_service_probe",
    "category": "recon",
    "description": "Collect TLS version, cipher, and certificate metadata from HTTPS services."
  },
  "triggers": {
    "phase": ["passive_recon", "verification"],
    "when": [
      {"condition": "has_https_origin"},
      {"condition": "not_already_done"}
    ],
    "target_source": "origins",
    "target_type": "https_origin"
  },
  "parameters": {
    "defaults": {
      "timeout_seconds": 5,
      "server_name": "$target_host"
    },
    "constraints": {}
  },
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.tls_service_metadata", "condition": "non_empty", "meaning": "TLS metadata collected"}
    ],
    "output_extraction": {
      "surface_updates": [
        {"field": "tls_service_metadata", "source": "surface_delta.tls_service_metadata"}
      ]
    },
    "severity_mapping": {},
    "severity_escalation": []
  },
  "follow_up": {
    "on_tls_metadata": {
      "trigger": ["rag_intel_lookup"],
      "when_surface_contains": {"tech_component_names": ["tls"]},
      "reason": "TLS protocol metadata should feed hardening intelligence and selective verification planning."
    }
  },
  "risk": {"level": "safe", "cost": 4, "priority": 12, "retry": {"max_retries": 1, "backoff_seconds": 0.5}},
  "dependencies": {"runtime": "ssl", "tools": ["nmap_scan"]}
}
