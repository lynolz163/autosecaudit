{
  "skill": {
    "name": "ssh_auth_audit",
    "version": "1.0",
    "tool": "ssh_auth_audit",
    "category": "validation",
    "description": "Validate SSH authentication surface and record the exposed protocol banner."
  },
  "triggers": {
    "phase": ["passive_recon", "verification"],
    "when": [
      {"condition": "not_already_done"},
      {"condition": "service_port_matches", "services": ["ssh"], "ports": [22]}
    ],
    "target_source": "surface",
    "target_type": "service_port"
  },
  "parameters": {
    "defaults": {
      "port": "$port",
      "service": "$service",
      "timeout_seconds": 4,
      "read_bytes": 256
    },
    "constraints": {}
  },
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.ssh_auth_surfaces", "condition": "non_empty", "meaning": "SSH authentication surface captured"}
    ],
    "output_extraction": {
      "surface_updates": [
        {"field": "ssh_auth_surfaces", "source": "surface_delta.ssh_auth_surfaces"}
      ]
    },
    "severity_mapping": {},
    "severity_escalation": []
  },
  "follow_up": {
    "on_ssh_stack": {
      "trigger": ["rag_intel_lookup", "cve_lookup"],
      "when_surface_contains": {"tech_component_names": ["ssh", "openssh", "dropbear", "libssh", "bitvise", "tectia"]},
      "reason": "SSH implementation banners can drive exploit intelligence and version-aware CVE lookup."
    }
  },
  "risk": {"level": "safe", "cost": 5, "priority": 16, "retry": {"max_retries": 1, "backoff_seconds": 0.5}},
  "dependencies": {"runtime": "socket", "tools": ["nmap_scan", "service_banner_probe"]}
}
