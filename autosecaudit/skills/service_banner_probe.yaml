{
  "skill": {
    "name": "service_banner_probe",
    "version": "1.0",
    "tool": "service_banner_probe",
    "category": "recon",
    "description": "Safely capture banners from nmap-discovered non-HTTP TCP services."
  },
  "triggers": {
    "phase": ["passive_recon", "active_discovery"],
    "when": [{"condition": "not_already_done"}],
    "target_source": "surface",
    "target_type": "service_port"
  },
  "parameters": {
    "defaults": {
      "port": "$port",
      "service": "$service",
      "timeout_seconds": 4,
      "read_bytes": 512
    },
    "constraints": {}
  },
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.service_banners", "condition": "non_empty", "meaning": "service banner telemetry collected"}
    ],
    "output_extraction": {
      "surface_updates": [
        {"field": "service_banners", "source": "surface_delta.service_banners"}
      ]
    },
    "severity_mapping": {},
    "severity_escalation": []
  },
  "follow_up": {},
  "risk": {
    "level": "safe",
    "cost": 4,
    "priority": 15,
    "retry": {"max_retries": 1, "backoff_seconds": 0.5}
  },
  "dependencies": {
    "runtime": "socket",
    "tools": ["nmap_scan"]
  }
}
