{
  "skill": {
    "name": "postgres_handshake_probe",
    "version": "1.0",
    "tool": "postgres_handshake_probe",
    "category": "validation",
    "description": "Collect PostgreSQL startup metadata and TLS support without authenticating."
  },
  "triggers": {
    "phase": ["passive_recon", "verification"],
    "when": [
      {"condition": "not_already_done"},
      {"condition": "service_port_matches", "services": ["postgres", "postgresql"], "ports": [5432]}
    ],
    "target_source": "surface",
    "target_type": "service_port"
  },
  "parameters": {
    "defaults": {
      "port": "$port",
      "service": "$service",
      "timeout_seconds": 4
    },
    "constraints": {}
  },
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.postgres_handshakes", "condition": "non_empty", "meaning": "PostgreSQL startup metadata collected"}
    ],
    "output_extraction": {
      "surface_updates": [
        {"field": "postgres_handshakes", "source": "surface_delta.postgres_handshakes"}
      ]
    },
    "severity_mapping": {
      "does not acknowledge ssl negotiation": "low"
    },
    "severity_escalation": []
  },
  "follow_up": {
    "on_db_stack": {
      "trigger": ["rag_intel_lookup", "cve_lookup"],
      "when_surface_contains": {"tech_component_names": ["postgresql", "postgres"]},
      "reason": "PostgreSQL metadata can drive intelligence-based validation and CVE lookup."
    }
  },
  "risk": {"level": "safe", "cost": 4, "priority": 21, "retry": {"max_retries": 1, "backoff_seconds": 0.5}},
  "dependencies": {"tools": ["nmap_scan", "service_banner_probe"]}
}
