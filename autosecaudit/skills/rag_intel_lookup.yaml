{
  "skill": {
    "name": "rag_intel_lookup",
    "version": "1.0",
    "tool": "rag_intel_lookup",
    "category": "validation",
    "description": "Retrieve exploit patterns and testing heuristics from local security knowledge corpus."
  },
  "triggers": {
    "phase": ["deep_testing", "verification"],
    "when": [
      {"condition": "has_tech_stack"},
      {"condition": "not_already_done"}
    ],
    "target_source": "surface.tech_stack",
    "target_type": "tech_component"
  },
  "parameters": {
    "defaults": {
      "component": "$component",
      "version": "$version",
      "query": "$component $version security weaknesses",
      "max_results": 6
    },
    "constraints": {}
  },
  "result_interpretation": {
    "success_indicators": [
      {"field": "surface_delta.rag_intel_hits", "condition": "non_empty", "meaning": "retrieved relevant security intelligence"}
    ],
    "output_extraction": {},
    "severity_mapping": {},
    "severity_escalation": []
  },
  "follow_up": {
    "on_recommend_cve_lookup": {
      "trigger": ["cve_lookup"],
      "reason": "RAG intel suggests known CVE correlations for detected stack.",
      "when_surface_contains": {"rag_recommended_tools": ["cve_lookup"]}
    },
    "on_recommend_nuclei": {
      "trigger": ["nuclei_exploit_check"],
      "reason": "RAG intel suggests template-based verification paths.",
      "when_surface_contains": {"rag_recommended_tools": ["nuclei_exploit_check"]}
    },
    "on_recommend_poc": {
      "trigger": ["poc_sandbox_exec"],
      "reason": "RAG intel suggests controlled sandbox validation for the detected component.",
      "when_surface_contains": {"rag_recommended_tools": ["poc_sandbox_exec"]}
    }
  },
  "risk": {"level": "safe", "cost": 3, "priority": 28, "retry": {"max_retries": 0, "backoff_seconds": 0.0}},
  "dependencies": {"runtime": "local_rag_corpus", "tools": ["tech_stack_fingerprint"]}
}
