{
  "skill": {
    "name": "sql_sanitization_audit",
    "version": "1.0",
    "tool": "sql_sanitization_audit",
    "category": "testing",
    "description": "Send bounded SQL hygiene probes to parameterized endpoints and inspect responses."
  },
  "triggers": {
    "phase": ["deep_testing", "verification"],
    "when": [{"condition": "has_parameterized_endpoints"}, {"condition": "crawler_signal_present"}, {"condition": "not_already_done"}],
    "target_source": "surface.endpoint_params",
    "target_type": "parameterized_endpoint"
  },
  "parameters": {"defaults": {"method": "GET", "params": "$params"}, "constraints": {}},
  "result_interpretation": {
    "success_indicators": [
      {"field": "findings", "condition": "non_empty", "meaning": "potential SQL injection signal identified"}
    ],
    "output_extraction": {},
    "severity_mapping": {},
    "severity_escalation": [
      {"if_finding_contains": ["error-based", "sqlstate", "syntax error"], "escalate_to": "high"}
    ]
  },
  "follow_up": {
    "on_injection_signal": {
      "condition": "findings_contain_sql_signal",
      "trigger": ["nuclei_exploit_check"],
      "reason": "SQL signals should be validated with curated nuclei templates."
    },
    "on_clean": {
      "condition": "clean_run",
      "trigger": ["xss_protection_audit"],
      "reason": "If SQL hygiene looks clean, continue with XSS checks on the same endpoint set."
    }
  },
  "risk": {"level": "medium", "cost": 8, "priority": 30, "retry": {}},
  "dependencies": {"runtime": null, "tools": ["dynamic_crawl"]}
}
