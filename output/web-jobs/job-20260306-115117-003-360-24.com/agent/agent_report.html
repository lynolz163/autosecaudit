  <script type="text/babel">
    const auditReport = JSON.parse(document.getElementById("audit-report-data").textContent || "{}");

    function MetricCard({ label, value, sub }) {
      return (
        <div className="glass rounded-2xl p-4">

          {sub ? <div className="mt-1 text-sm text-slate-500">{sub}</div> : null}
        </div>
      );
    }

    function BudgetLineChart({ trace }) {
      const points = Array.isArray(trace) ? trace.filter((p) => typeof p.cumulative_spent === "number") : [];
      if (!points.length) {
        return <div className="text-sm text-slate-500">No budget trace available.</div>;
      }
      const width = 760;
      const height = 220;
      const pad = 26;
      const maxY = Math.max(1, ...points.map((p) => p.cumulative_spent || 0));
      const maxX = Math.max(1, points.length - 1);
      const coords = points.map((p, i) => {
        const x = pad + ((width - pad * 2) * (points.length === 1 ? 0 : i / maxX));
        const y = height - pad - ((height - pad * 2) * ((p.cumulative_spent || 0) / maxY));
        return { ...p, x, y };
      });
      const linePath = coords.map((p, idx) => (idx === 0 ? "M" : "L") + p.x + "," + p.y).join(" ");
      const areaPath = linePath + " L" + coords[coords.length - 1].x + "," + (height - pad) + " L" + coords[0].x + "," + (height - pad) + " Z";
      return (
        <div>
          <div className="w-full overflow-x-auto">
            <svg viewBox={"0 0 " + width + " " + height} className="w-full min-w-[520px]">
              <defs>
                <linearGradient id="budgetFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#0ea5e9" stopOpacity="0.26" />
                  <stop offset="100%" stopColor="#0ea5e9" stopOpacity="0.03" />
                </linearGradient>
              </defs>
              <rect x="0" y="0" width={width} height={height} rx="16" fill="#ffffff" opacity="0.75" />
              {[0, 0.25, 0.5, 0.75, 1].map((r, idx) => {
                const y = pad + (height - pad * 2) * r;
                return <line key={idx} x1={pad} y1={y} x2={width - pad} y2={y} stroke="#e2e8f0" strokeWidth="1" />;
              })}
              {coords.length > 1 ? <path d={areaPath} fill="url(#budgetFill)" /> : null}
              <path d={linePath} fill="none" stroke="#0284c7" strokeWidth="3" strokeLinecap="round" />
              {coords.map((p) => (
                <g key={p.step}>
                  <circle cx={p.x} cy={p.y} r="4" fill="#0284c7" />
                  <text x={p.x} y={height - 7} textAnchor="middle" fontSize="10" fill="#475569">{p.step}</text>

              ))}
            </svg>
          </div>

                <span className="tabular-nums">+{p.cost || 0} (total {p.cumulative_spent || 0})</span>

{String(item.evidence || "No evidence provided.")}

                  {ports.slice(0, 20).map((p, i) => (
                    <div key={i} className="flex justify-between">
                      <span>{typeof p === "object" ? (p.port + "/" + (p.protocol || "-")) : p}</span>
                      <span className="text-slate-500">{typeof p === "object" ? (p.service || "-") : ""}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* HTTP Headers */}
            {Object.keys(hdrs).length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">HTTP Headers</div>
                <div className="max-h-48 overflow-auto text-xs space-y-0.5">
                  {Object.entries(hdrs).map(([k, v], i) => (
                    <div key={i}><span className="font-medium">{k}:</span> <span className="text-slate-600 break-all">{String(v).slice(0, 100)}</span></div>
                  ))}
                </div>
              </div>
            )}

            {/* CSP */}
            {Object.keys(csp).length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Content Security Policy</div>
                <div className="space-y-1">
                  <KV k="Present" v={csp.present ? "Yes" : "No"} />
                  {csp.present && <KV k="script-src" v={csp.has_script_src ? "✅" : "❌"} />}
                  {csp.present && <KV k="default-src" v={csp.has_default_src ? "✅" : "❌"} />}
                  {Array.isArray(csp.risky_tokens) && csp.risky_tokens.length > 0 && (
                    <div className="mt-2"><div className="flex flex-wrap">{csp.risky_tokens.map((t, i) => <Chip key={i} label={t} color="bg-red-100 text-red-700" />)}</div></div>
                  )}
                </div>
              </div>
            )}

            {/* Cookies */}
            {cookies.length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Cookies ({cookies.length})</div>
                <div className="max-h-48 overflow-auto text-xs space-y-1">
                  {cookies.map((c, i) => (
                    <div key={i} className="flex items-center gap-2">
                      <span className="font-medium truncate max-w-[120px]">{c.name || "-"}</span>
                      <Chip label={c.secure ? "Secure" : "!Secure"} color={c.secure ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"} />
                      <Chip label={c.httponly ? "Http" : "!Http"} color={c.httponly ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"} />
                      <Chip label={c.samesite ? "Same" : "!Same"} color={c.samesite ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"} />
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* security.txt */}
            {Object.keys(stxt).length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">security.txt</div>
                <div className="space-y-1">
                  <KV k="Present" v={stxt.present ? "Yes" : "No"} />
                  {stxt.present && <KV k="Contact" v={stxt.has_contact ? "✅" : "❌"} />}
                  {stxt.present && <KV k="Expires" v={stxt.has_expires ? "✅" : "❌"} />}
                </div>
              </div>
            )}

            {/* Login Forms */}
            {login.length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Login Forms ({login.length})</div>
                <div className="max-h-48 overflow-auto text-xs space-y-1">
                  {login.map((f, i) => (
                    <div key={i}><span className="font-medium">{f.method || "GET"}</span> <span className="text-slate-600 break-all">{f.action || "-"}</span></div>
                  ))}
                </div>
              </div>
            )}

            {/* API Schemas */}
            {schemas.length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">API Schemas ({schemas.length})</div>
                <div className="max-h-48 overflow-auto text-xs space-y-1">
                  {schemas.map((s, i) => (
                    <div key={i}><Chip label={s.kind || "-"} color="bg-blue-100 text-blue-700" /><span className="break-all">{s.url || "-"}</span></div>
                  ))}
                </div>
              </div>
            )}

            {/* Git Exposures */}
            {git.length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">VCS Exposures ({git.length})</div>
                <div className="max-h-48 overflow-auto text-xs space-y-1">
                  {git.map((g, i) => (
                    <div key={i}><Chip label={g.type || "-"} color="bg-red-100 text-red-700" /><span className="break-all">{g.url || "-"}</span></div>
                  ))}
                </div>
              </div>
            )}

            {/* Source Maps */}
            {smaps.length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Source Maps ({smaps.length})</div>
                <div className="max-h-48 overflow-auto text-xs space-y-0.5">
                  {smaps.slice(0, 15).map((s, i) => <div key={i} className="truncate">{s}</div>)}
                </div>
              </div>
            )}

            {/* Error Page Markers */}
            {markers.length > 0 && (
              <div className="glass rounded-2xl p-4">
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Error Page Markers</div>
                <div className="flex flex-wrap">{markers.map((m, i) => <Chip key={i} label={m} color="bg-orange-100 text-orange-700" />)}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const summary = auditReport.summary || {};
      const meta = auditReport.meta || {};
      const scopePayload = auditReport.scope || {};
      const recon = auditReport.recon || {};
      const findings = Array.isArray(auditReport.findings) ? auditReport.findings : [];
      const vulnFindings = findings
        .filter((f) => String(f.type || "").toLowerCase() === "vuln")
        .sort((a, b) => severityRank.indexOf(String(a.severity || "info")) - severityRank.indexOf(String(b.severity || "info")));
      const severityCounts = summary.severity_counts || {};
      const highCritical = Number(severityCounts.critical || 0) + Number(severityCounts.high || 0);

      return (
        <div className="mx-auto max-w-7xl px-4 py-8 md:px-6">
          <div className="glass rounded-3xl p-6">
            <div className="flex flex-wrap items-start justify-between gap-5">
              <div>
                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">AutoSecAudit Agent</div>
                <h1 className="mt-2 text-2xl font-semibold md:text-3xl">Visual Audit Report</h1>
                <div className="mt-2 break-all text-sm text-slate-700">{meta.target || agentState.target || "Unknown target"}</div>
                <div className="mt-1 text-sm text-slate-500">{meta.decision_summary || "No decision summary available."}</div>
              </div>
              <div className="rounded-2xl bg-slate-900 px-5 py-4 text-white">
                <div className="text-xs uppercase tracking-wider text-slate-300">Audit Score</div>
                <div className="mt-1 text-3xl font-semibold tabular-nums">{summary.audit_score ?? 0}</div>
                <div className="text-xs text-slate-300">{summary.score_label || "N/A"}</div>
              </div>
            </div>
          </div>

          <div className="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
            <MetricCard label="Findings" value={summary.total_findings ?? 0} sub={"Vulns: " + (summary.vulnerability_findings ?? 0)} />
            <MetricCard label="High/Critical" value={highCritical} sub={"Critical " + (severityCounts.critical || 0) + " / High " + (severityCounts.high || 0)} />
            <MetricCard label="Budget Remaining" value={summary.budget_remaining ?? 0} sub={"Iterations " + (summary.iteration_count ?? 0)} />
            <MetricCard label="Executed Actions" value={summary.history_count ?? 0} sub={meta.resumed ? ("Resumed: " + (meta.resumed_from || "state")) : "Fresh run"} />
          </div>

          <div className="mt-6 grid gap-6 xl:grid-cols-[1.15fr_0.85fr]">
            <div className="glass rounded-2xl p-5">
              <div className="flex items-center justify-between">
                <h2 className="text-lg font-semibold">Action Budget Consumption</h2>
                <div className="text-xs text-slate-500">Cumulative cost line chart</div>
              </div>
              <div className="mt-4">
                <BudgetLineChart trace={auditReport.budget_trace || []} />
              </div>
            </div>
            <div className="glass rounded-2xl p-5">
              <h2 className="text-lg font-semibold">Severity Distribution</h2>
              <div className="mt-4 space-y-3">
                {severityRank.map((sev) => {
                  const value = Number(severityCounts[sev] || 0);
                  const all = severityRank.map((k) => Number(severityCounts[k] || 0));
                  const max = Math.max(1, ...all);
                  const pct = value ? Math.max(5, Math.round((value / max) * 100)) : 0;
                  return (
                    <div key={sev}>
                      <div className="mb-1 flex justify-between text-sm">
                        <span className="capitalize">{sev}</span>
                        <span className="tabular-nums text-slate-600">{value}</span>
                      </div>
                      <div className="h-2 rounded-full bg-slate-100">
                        <div className="h-2 rounded-full bg-gradient-to-r from-cyan-400 to-blue-500" style={{ width: pct + "%" }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="mt-6">
            <ScopeMap scopePayload={scopePayload} />
          </div>

          {/* ---------- Reconnaissance Section ---------- */}
          <ReconSection recon={recon} />

          <div className="mt-6">
            <div className="mb-3 flex items-center justify-between">
              <h2 className="text-lg font-semibold">Vulnerability Cards</h2>
              <div className="text-xs text-slate-500">Evidence + remediation suggestions</div>
            </div>
            <div className="space-y-4">
              {vulnFindings.length ? vulnFindings.map((item) => (
                <VulnerabilityCard key={String(item.index) + "-" + String(item.name)} item={item} />
              )) : (
                <div className="glass rounded-2xl p-6 text-sm text-slate-500">No vulnerability findings available.</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
