services:
  autosecaudit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set to "1" if you want nuclei binary preinstalled in the image.
        INSTALL_NUCLEI: "${INSTALL_NUCLEI:-0}"
        NUCLEI_VERSION: "${NUCLEI_VERSION:-3.3.10}"
        # Set to "1" if you need Playwright/Chromium for dynamic_crawl.
        INSTALL_PLAYWRIGHT: "${INSTALL_PLAYWRIGHT:-0}"
        # Set to "1" only if you want to download Chromium at build time (high memory usage).
        INSTALL_PLAYWRIGHT_BROWSER: "${INSTALL_PLAYWRIGHT_BROWSER:-0}"
    image: autosecaudit:latest
    container_name: autosecaudit
    # Linux bind-mount compatibility: default to root to avoid host directory permission issues.
    # Override with e.g. AUTOSECAUDIT_CONTAINER_USER=1000:1000 if host paths are chowned properly.
    user: "${AUTOSECAUDIT_CONTAINER_USER:-0:0}"
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      TZ: Asia/Shanghai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN:-}
      LYNOLZ_BOT_TOKEN: ${LYNOLZ_BOT_TOKEN:-}
      AUTOSECAUDIT_WEB_API_TOKEN: ${AUTOSECAUDIT_WEB_API_TOKEN:-}
      AUTOSECAUDIT_WEB_DEFAULT_ADMIN_USERNAME: ${AUTOSECAUDIT_WEB_DEFAULT_ADMIN_USERNAME:-}
      AUTOSECAUDIT_WEB_DEFAULT_ADMIN_PASSWORD: ${AUTOSECAUDIT_WEB_DEFAULT_ADMIN_PASSWORD:-}
      AUTOSECAUDIT_WEB_DEFAULT_ADMIN_DISPLAY_NAME: ${AUTOSECAUDIT_WEB_DEFAULT_ADMIN_DISPLAY_NAME:-}
      AUTOSECAUDIT_WEB_JWT_SECRET: ${AUTOSECAUDIT_WEB_JWT_SECRET:-}
      AUTOSECAUDIT_WEB_JWT_TTL_SECONDS: ${AUTOSECAUDIT_WEB_JWT_TTL_SECONDS:-28800}
      AUTOSECAUDIT_WEB_REFRESH_TTL_SECONDS: ${AUTOSECAUDIT_WEB_REFRESH_TTL_SECONDS:-1209600}
      AUTOSECAUDIT_WEB_MAX_JOBS: ${AUTOSECAUDIT_WEB_MAX_JOBS:-200}
      AUTOSECAUDIT_WEB_MAX_RUNNING_JOBS: ${AUTOSECAUDIT_WEB_MAX_RUNNING_JOBS:-4}
      AUTOSECAUDIT_WEB_PUBLIC_BASE_URL: ${AUTOSECAUDIT_WEB_PUBLIC_BASE_URL:-}
      AUTOSECAUDIT_WEB_CORS_ALLOW_ORIGINS: ${AUTOSECAUDIT_WEB_CORS_ALLOW_ORIGINS:-}
      AUTOSECAUDIT_WEB_ENABLE_METRICS: ${AUTOSECAUDIT_WEB_ENABLE_METRICS:-1}
      AUTOSECAUDIT_WEB_RATE_LIMIT_AUTH_LOGIN: ${AUTOSECAUDIT_WEB_RATE_LIMIT_AUTH_LOGIN:-5/60}
      AUTOSECAUDIT_WEB_RATE_LIMIT_AUTH_REFRESH: ${AUTOSECAUDIT_WEB_RATE_LIMIT_AUTH_REFRESH:-20/300}
      AUTOSECAUDIT_WEB_RATE_LIMIT_API_WRITE: ${AUTOSECAUDIT_WEB_RATE_LIMIT_API_WRITE:-120/60}
      AUTOSECAUDIT_WEB_PASSWORD_MIN_LENGTH: ${AUTOSECAUDIT_WEB_PASSWORD_MIN_LENGTH:-10}
      AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_MIXED_CASE: ${AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_MIXED_CASE:-1}
      AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_DIGIT: ${AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_DIGIT:-1}
      AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_SPECIAL: ${AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_SPECIAL:-0}
      AUTOSECAUDIT_CODEX_PROVIDER_ALIAS: ${AUTOSECAUDIT_CODEX_PROVIDER_ALIAS:-codex}
      AUTOSECAUDIT_CODEX_BASE_URL: ${AUTOSECAUDIT_CODEX_BASE_URL:-https://api.openai.com/v1}
      AUTOSECAUDIT_CODEX_OAUTH_BUILTIN_PRESET: ${AUTOSECAUDIT_CODEX_OAUTH_BUILTIN_PRESET:-1}
      AUTOSECAUDIT_CODEX_OAUTH_AUTHORIZE_URL: ${AUTOSECAUDIT_CODEX_OAUTH_AUTHORIZE_URL:-}
      AUTOSECAUDIT_CODEX_OAUTH_TOKEN_URL: ${AUTOSECAUDIT_CODEX_OAUTH_TOKEN_URL:-}
      AUTOSECAUDIT_CODEX_OAUTH_CLIENT_ID: ${AUTOSECAUDIT_CODEX_OAUTH_CLIENT_ID:-}
      AUTOSECAUDIT_CODEX_OAUTH_SCOPES: ${AUTOSECAUDIT_CODEX_OAUTH_SCOPES:-openid,profile,offline_access}
      AUTOSECAUDIT_CODEX_OAUTH_PROFILE_ID: ${AUTOSECAUDIT_CODEX_OAUTH_PROFILE_ID:-web}
      AUTOSECAUDIT_CODEX_OAUTH_PROFILES_FILE: ${AUTOSECAUDIT_CODEX_OAUTH_PROFILES_FILE:-/workspace/config/auth-profiles.json}
      AUTOSECAUDIT_CODEX_OAUTH_TOKEN_ENV: ${AUTOSECAUDIT_CODEX_OAUTH_TOKEN_ENV:-OPENAI_ACCESS_TOKEN}
      AUTOSECAUDIT_CODEX_OAUTH_AUTO_REFRESH: ${AUTOSECAUDIT_CODEX_OAUTH_AUTO_REFRESH:-1}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - ./output:/workspace/output
      - ./config:/workspace/config
      - ./wordlists:/workspace/wordlists
    command: ["--help"]

  autosecaudit-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_NUCLEI: "${INSTALL_NUCLEI:-1}"
        NUCLEI_VERSION: "${NUCLEI_VERSION:-3.3.10}"
        # Install Playwright Python package for dynamic_crawl adapters.
        INSTALL_PLAYWRIGHT: "${INSTALL_PLAYWRIGHT:-1}"
        # Keep Chromium download off by default to avoid low-memory build OOM.
        INSTALL_PLAYWRIGHT_BROWSER: "${INSTALL_PLAYWRIGHT_BROWSER:-0}"
    image: autosecaudit:latest
    container_name: autosecaudit-web
    # Linux bind-mount compatibility: default to root to avoid host directory permission issues.
    # Override with e.g. AUTOSECAUDIT_CONTAINER_USER=1000:1000 if host paths are chowned properly.
    user: "${AUTOSECAUDIT_CONTAINER_USER:-0:0}"
    working_dir: /workspace
    environment:
      TZ: Asia/Shanghai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN:-}
      LYNOLZ_BOT_TOKEN: ${LYNOLZ_BOT_TOKEN:-}
      AUTOSECAUDIT_WEB_API_TOKEN: ${AUTOSECAUDIT_WEB_API_TOKEN:-}
      AUTOSECAUDIT_WEB_DEFAULT_ADMIN_USERNAME: ${AUTOSECAUDIT_WEB_DEFAULT_ADMIN_USERNAME:-}
      AUTOSECAUDIT_WEB_DEFAULT_ADMIN_PASSWORD: ${AUTOSECAUDIT_WEB_DEFAULT_ADMIN_PASSWORD:-}
      AUTOSECAUDIT_WEB_DEFAULT_ADMIN_DISPLAY_NAME: ${AUTOSECAUDIT_WEB_DEFAULT_ADMIN_DISPLAY_NAME:-}
      AUTOSECAUDIT_WEB_JWT_SECRET: ${AUTOSECAUDIT_WEB_JWT_SECRET:-}
      AUTOSECAUDIT_WEB_JWT_TTL_SECONDS: ${AUTOSECAUDIT_WEB_JWT_TTL_SECONDS:-28800}
      AUTOSECAUDIT_WEB_REFRESH_TTL_SECONDS: ${AUTOSECAUDIT_WEB_REFRESH_TTL_SECONDS:-1209600}
      AUTOSECAUDIT_WEB_MAX_JOBS: ${AUTOSECAUDIT_WEB_MAX_JOBS:-200}
      AUTOSECAUDIT_WEB_MAX_RUNNING_JOBS: ${AUTOSECAUDIT_WEB_MAX_RUNNING_JOBS:-4}
      AUTOSECAUDIT_WEB_PUBLIC_BASE_URL: ${AUTOSECAUDIT_WEB_PUBLIC_BASE_URL:-}
      AUTOSECAUDIT_WEB_CORS_ALLOW_ORIGINS: ${AUTOSECAUDIT_WEB_CORS_ALLOW_ORIGINS:-}
      AUTOSECAUDIT_WEB_ENABLE_METRICS: ${AUTOSECAUDIT_WEB_ENABLE_METRICS:-1}
      AUTOSECAUDIT_WEB_RATE_LIMIT_AUTH_LOGIN: ${AUTOSECAUDIT_WEB_RATE_LIMIT_AUTH_LOGIN:-5/60}
      AUTOSECAUDIT_WEB_RATE_LIMIT_AUTH_REFRESH: ${AUTOSECAUDIT_WEB_RATE_LIMIT_AUTH_REFRESH:-20/300}
      AUTOSECAUDIT_WEB_RATE_LIMIT_API_WRITE: ${AUTOSECAUDIT_WEB_RATE_LIMIT_API_WRITE:-120/60}
      AUTOSECAUDIT_WEB_PASSWORD_MIN_LENGTH: ${AUTOSECAUDIT_WEB_PASSWORD_MIN_LENGTH:-10}
      AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_MIXED_CASE: ${AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_MIXED_CASE:-1}
      AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_DIGIT: ${AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_DIGIT:-1}
      AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_SPECIAL: ${AUTOSECAUDIT_WEB_PASSWORD_REQUIRE_SPECIAL:-0}
      AUTOSECAUDIT_CODEX_PROVIDER_ALIAS: ${AUTOSECAUDIT_CODEX_PROVIDER_ALIAS:-codex}
      AUTOSECAUDIT_CODEX_BASE_URL: ${AUTOSECAUDIT_CODEX_BASE_URL:-https://api.openai.com/v1}
      AUTOSECAUDIT_CODEX_OAUTH_BUILTIN_PRESET: ${AUTOSECAUDIT_CODEX_OAUTH_BUILTIN_PRESET:-1}
      AUTOSECAUDIT_CODEX_OAUTH_AUTHORIZE_URL: ${AUTOSECAUDIT_CODEX_OAUTH_AUTHORIZE_URL:-}
      AUTOSECAUDIT_CODEX_OAUTH_TOKEN_URL: ${AUTOSECAUDIT_CODEX_OAUTH_TOKEN_URL:-}
      AUTOSECAUDIT_CODEX_OAUTH_CLIENT_ID: ${AUTOSECAUDIT_CODEX_OAUTH_CLIENT_ID:-}
      AUTOSECAUDIT_CODEX_OAUTH_SCOPES: ${AUTOSECAUDIT_CODEX_OAUTH_SCOPES:-openid,profile,offline_access}
      AUTOSECAUDIT_CODEX_OAUTH_PROFILE_ID: ${AUTOSECAUDIT_CODEX_OAUTH_PROFILE_ID:-web}
      AUTOSECAUDIT_CODEX_OAUTH_PROFILES_FILE: ${AUTOSECAUDIT_CODEX_OAUTH_PROFILES_FILE:-/workspace/config/auth-profiles.json}
      AUTOSECAUDIT_CODEX_OAUTH_TOKEN_ENV: ${AUTOSECAUDIT_CODEX_OAUTH_TOKEN_ENV:-OPENAI_ACCESS_TOKEN}
      AUTOSECAUDIT_CODEX_OAUTH_AUTO_REFRESH: ${AUTOSECAUDIT_CODEX_OAUTH_AUTO_REFRESH:-1}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - ./output:/workspace/output
      - ./config:/workspace/config
      - ./wordlists:/workspace/wordlists
    ports:
      - "${AUTOSECAUDIT_WEB_PORT:-18081}:8080"
      # Browser OAuth callback for codex_oauth (used by web-launched jobs if enabled)
      - "${AUTOSECAUDIT_OAUTH_CALLBACK_PORT:-8765}:8765"
    command:
      - web
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --workspace
      - /workspace
      - --output-root
      - /workspace/output/web-jobs

# Examples:
#   docker compose run --rm autosecaudit init --output /workspace/config/llm_router.json
#   docker compose run --rm autosecaudit --target https://example.com --mode plan --scope example.com --output /workspace/output
#   docker compose run --rm --service-ports autosecaudit ...  # only if you need OAuth callback port on CLI jobs
#   docker compose up -d autosecaudit-web  # open http://localhost:${AUTOSECAUDIT_WEB_PORT:-18080}
