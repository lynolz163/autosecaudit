services:
  autosecaudit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_NUCLEI: "${INSTALL_NUCLEI:-0}"
        NUCLEI_VERSION: "${NUCLEI_VERSION:-3.3.10}"
        INSTALL_PLAYWRIGHT: "${INSTALL_PLAYWRIGHT:-0}"
        INSTALL_PLAYWRIGHT_BROWSER: "${INSTALL_PLAYWRIGHT_BROWSER:-0}"
    image: autosecaudit:latest
    container_name: autosecaudit
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      TZ: Asia/Shanghai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - ./output:/workspace/output
      - ./config:/workspace/config
      - ./wordlists:/workspace/wordlists
    command: ["--help"]

# Examples:
#   docker compose run --rm autosecaudit doctor
#   docker compose run --rm autosecaudit skills list
#   docker compose run --rm autosecaudit --target https://example.com --mode plan --scope example.com --output /workspace/output
#   docker compose run --rm autosecaudit --target https://example.com --mode agent --scope example.com --output /workspace/output
